<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FOR THE BUS GEEKS</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2c2f3f;
    --accent:   #f5a623;
    --accent2:  #3b82f6;
    --sbs:      #3b82f6;
    --limited:  #f59e0b;
    --local:    #22c55e;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --danger:   #ef4444;
    --panel-w:  320px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Top Bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 1000;
  }

  #topbar h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent);
    white-space: nowrap;
  }

  .tool-group {
    display: flex;
    gap: 6px;
    margin-left: 8px;
  }

  .tool-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--text); }
  .tool-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tool-btn.active-wp { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }

  .sep { width: 1px; background: var(--border); height: 28px; margin: 0 4px; }

  #sim-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  #sim-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: none;
    background: var(--local);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  #sim-btn.running { background: var(--danger); color: #fff; }

  #speed-label { font-size: 11px; color: var(--muted); }
  #speed-range { width: 80px; accent-color: var(--accent); }

  /* ── Main Layout ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Map ── */
  #map {
    flex: 1;
    min-width: 0;
    height: 100%;
    z-index: 1;
    cursor: crosshair;
  }
  #map.pan-mode { cursor: grab; }

  /* ── Side Panel ── */
  #panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }

  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .panel-tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; flex: 1; overflow-y: auto; padding: 12px; }
  .tab-content.active { display: flex; flex-direction: column; gap: 10px; }

  /* ── Cards ── */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .card-title { font-size: 12px; font-weight: 700; color: var(--text); }

  /* ── Forms ── */
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
  input[type=text], input[type=number], select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 12px;
    padding: 5px 8px;
    margin-bottom: 8px;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }

  .type-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .chip {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    border: 1.5px solid;
    cursor: pointer;
    transition: all 0.12s;
    opacity: 0.45;
  }
  .chip.selected { opacity: 1; }
  .chip.local  { border-color: var(--local);   color: var(--local); }
  .chip.limited{ border-color: var(--limited); color: var(--limited); }
  .chip.sbs    { border-color: var(--sbs);     color: var(--sbs); }
  .chip.local.selected   { background: var(--local);   color: #000; }
  .chip.limited.selected { background: var(--limited); color: #000; }
  .chip.sbs.selected     { background: var(--sbs);     color: #fff; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-accent  { background: var(--accent);  color: #000; }
  .btn-danger  { background: var(--danger);  color: #fff; }
  .btn-muted   { background: var(--border);  color: var(--text); }
  .btn-purple  { background: #8b5cf6;        color: #fff; }
  .btn-full    { width: 100%; }

  /* ── Stop list items ── */
  .stop-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .stop-item:hover { border-color: var(--accent); }
  .stop-item .stop-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .stop-item .stop-name { flex: 1; font-weight: 600; }
  .stop-item .stop-tags { display: flex; gap: 3px; }
  .tag {
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 3px;
  }
  .tag.local   { background: var(--local);   color: #000; }
  .tag.limited { background: var(--limited); color: #000; }
  .tag.sbs     { background: var(--sbs);     color: #fff; }
  .stop-item .del-btn {
    background: none; border: none; color: var(--danger);
    font-size: 14px; cursor: pointer; line-height: 1; padding: 0 2px;
  }

  /* ── Route items ── */
  .route-item {
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .route-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg);
    cursor: pointer;
    user-select: none;
  }
  .route-badge {
    font-size: 11px; font-weight: 800; padding: 2px 8px;
    border-radius: 4px; color: #000;
  }
  .route-name { font-size: 12px; font-weight: 700; flex: 1; }
  .route-expand { color: var(--muted); font-size: 12px; }
  .route-body { display: none; padding: 10px; background: var(--surface); }
  .route-body.open { display: block; }

  .side-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
  .side-tab {
    flex: 1; padding: 4px 0; text-align: center; border-radius: 5px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    border: 1px solid var(--border); color: var(--muted);
    transition: all 0.12s;
  }
  .side-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .stop-sequence { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .seq-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; border-radius: 5px;
    background: var(--bg); border: 1px solid var(--border);
    font-size: 11px;
    cursor: pointer;
  }
  .seq-item:hover { border-color: var(--accent); }
  .seq-item.editing { border-color: var(--accent); background: #1a1d27; }
  .seq-num { color: var(--muted); font-size: 10px; width: 16px; text-align: right; }
  .seq-name { flex: 1; font-weight: 600; }
  .seq-type-badge {
    font-size: 9px; font-weight: 700; padding: 1px 4px;
    border-radius: 3px; border: 1px solid #555; color: #aaa;
  }
  .seq-type-badge.waypoint { border-color: #8b5cf6; color: #8b5cf6; }
  .seq-remove {
    background: none; border: none; color: var(--danger);
    font-size: 13px; cursor: pointer; line-height: 1;
  }

  /* ── Stop edit inline panel ── */
  .seq-edit-row {
    display: flex; flex-direction: column; gap: 4px;
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 5px; padding: 6px 8px; margin-bottom: 4px;
    font-size: 11px;
  }
  .seq-edit-row input[type=text] {
    margin-bottom: 4px; font-size: 11px; padding: 3px 6px;
  }
  .seq-edit-btns { display: flex; gap: 4px; }
  .seq-edit-btns button { font-size: 10px; padding: 3px 8px; }

  .add-stop-row { display: flex; gap: 6px; }
  .add-stop-row select { margin-bottom: 0; flex: 1; }

  /* ── Waypoint toggle ── */
  .wp-toggle-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted); margin-bottom: 6px;
  }
  .wp-toggle-row input[type=checkbox] { width: auto; margin: 0; accent-color: #8b5cf6; }

  .bus-config { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .bus-config label { margin: 0; white-space: nowrap; }
  .bus-config input { width: 50px; margin: 0; }
  .fleet-item {
    display:flex;align-items:center;gap:5px;padding:4px 8px;
    border-radius:5px;border:1px solid var(--border);
    background:var(--bg);font-size:11px;
  }
  .fleet-item .fleet-label { flex:1; font-weight:600; color:var(--muted); }
  .fleet-type-btn {
    font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;
    border:1px solid transparent;cursor:pointer;transition:all 0.12s;
  }

  /* ── Empty states ── */
  .empty { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Leaflet overrides ── */
  .leaflet-popup-content-wrapper {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background: var(--surface); }
  .leaflet-popup-content { margin: 10px 14px; font-size: 12px; }

  
.route-search{margin-bottom:6px;}
.route-section-title{font-size:10px;font-weight:700;color:var(--muted);margin:6px 0 4px;}
.multi-add-item:hover{background:rgba(245,166,35,0.12);color:var(--accent);}
.multi-add-item:hover .multi-add-hint{color:var(--accent);}


.btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Status bar ── */
  #statusbar {
    height: 24px; line-height: 24px;
    padding: 0 14px;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div id="topbar">
  <h1 style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;" title="FOR THE BUS GEEKS - The Game I've Always Ever Wanted">BUS GEEK 1.0</h1>

  <div class="sep"></div>

  <div class="tool-group">
    <button class="tool-btn" id="btn-pan"       onclick="setTool('pan')">✋ Pan</button>
    <button class="tool-btn" id="btn-stop"       onclick="setTool('stop')">🔵 Add Stop</button>
    <button class="tool-btn" id="btn-waypoint"   onclick="setTool('waypoint')">◆ Add Waypoint</button>
    <button class="tool-btn" id="btn-route"      onclick="setTool('route')">➕ New Route</button>
    <button class="tool-btn" id="btn-toggle-wp"  onclick="toggleWaypointVisibility()">👁 Waypoints</button>
  </div>

  <div class="sep"></div>

  <div class="tool-group">
    <button class="tool-btn" id="btn-save" onclick="saveToFile()">💾 Save</button>
    <button class="tool-btn" id="btn-load" onclick="document.getElementById('load-file-input').click()">📂 Load</button>
    <input type="file" id="load-file-input" accept="application/json" style="display:none;" onchange="loadFromFile(event)" />
  </div>

  <div class="sep"></div>

  <div id="sim-controls">
    <span id="speed-label">Speed</span>
    <input type="range" id="speed-range" min="1" max="10" value="5" oninput="updateSpeed(this.value)" />
    <button id="sim-btn" onclick="toggleSim()">▶ Start Simulation</button>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div id="main">
  <div id="map"></div>

  <!-- ══ SIDE PANEL ══ -->
  <div id="panel">
    <div class="panel-tabs">
      <div class="panel-tab active" onclick="switchTab('stops')">Stops</div>
      <div class="panel-tab"       onclick="switchTab('routes')">Routes</div>
    </div>

    <!-- STOPS TAB -->
    <div class="tab-content active" id="tab-stops">
      <div style="font-size:11px;color:var(--muted);">
        Select <strong style="color:var(--text)">Add Stop</strong> or <strong style="color:#c4b5fd">Add Waypoint</strong> then click the map.
      </div>
      <div id="stop-list"></div>
    </div>

    <!-- ROUTES TAB -->
    <div class="tab-content" id="tab-routes">
      <button class="btn btn-accent btn-full" onclick="openNewRouteForm()">➕ Create Route</button>

      <!-- New Route Form -->
      <div class="card" id="new-route-form" style="display:none;">
        <div class="card-header">
          <span class="card-title">New Route</span>
          <button class="btn btn-muted" style="padding:2px 8px;font-size:11px;" onclick="closeNewRouteForm()">✕</button>
        </div>
        <label>Route Name</label>
        <input type="text" id="nr-name" placeholder="e.g. Bx15" />
        <label>Service Type</label>
        <div class="type-chips" id="nr-type-chips">
          <div class="chip local selected" onclick="selectRouteType('local')">Local</div>
          <div class="chip limited"        onclick="selectRouteType('limited')">Limited</div>
          <div class="chip sbs"            onclick="selectRouteType('sbs')">SBS</div>
        </div>
        <label>Route Color</label>
        <input type="color" id="nr-color" value="#f5a623" style="width:48px;height:28px;padding:2px;background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;margin-bottom:8px;" />
        <label>Buses on this route</label>
        <input type="number" id="nr-buses" value="1" min="1" max="20" />
        <button class="btn btn-accent btn-full" onclick="createRoute()">Create</button>
      </div>

      <div id="route-list"></div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar">Click the map to place stops • Select a tool above</div>

<script>
// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
const state = {
  tool: 'pan',
  stops: [],
  // stops: { id, name, lat, lng, types:[], marker, isWaypoint:bool }
  routes: [],
  // routes: { id, name, type, color, buses:n, sideA:[], sideB:[], polyA, polyB, activeSide:'A' }
  simRunning: false,
  simBuses: [],
  simInterval: null,
  speedMult: 5,
  stopIdCounter: 0,
  routeIdCounter: 0,
  waypointsVisible: true,
};

let selectedRouteType = 'local';
// Track which seq-item is currently being edited: { routeId, side, stopId }
let editingSeqItem = null;
window._routeSearch = {};
window._routePickMode = {
  active: false,
  routeId: null,
  side: null
};

// ════════════════════════════════════════════
//  MAP INIT
// ════════════════════════════════════════════
const map = L.map('map', { zoomControl: true }).setView([40.8448, -73.8648], 13);
setTimeout(() => map.invalidateSize(), 0);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

map.on('click', onMapClick);
map.on('zoomend', () => redrawRouteLines());

// ════════════════════════════════════════════
//  TOOL MANAGEMENT
// ════════════════════════════════════════════
function setTool(t) {
  state.tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => {
    b.classList.remove('active');
    b.classList.remove('active-wp');
  });
  if (t === 'waypoint') {
    document.getElementById('btn-waypoint').classList.add('active-wp');
  } else {
    document.getElementById('btn-' + t)?.classList.add('active');
  }
  const mapEl = document.getElementById('map');
  mapEl.className = t === 'pan' ? 'pan-mode' : '';
  setStatus(
    t === 'stop'     ? '🔵 Click the map to place a stop' :
    t === 'waypoint' ? '◆ Click the map to place a waypoint (guides the path, no passenger boarding)' :
    t === 'route'    ? '➕ Open Routes tab and create a route' :
    '✋ Pan mode – drag to move map'
  );
}
setTool('pan');

// ════════════════════════════════════════════
//  WAYPOINT VISIBILITY TOGGLE
// ════════════════════════════════════════════
function toggleWaypointVisibility() {
  state.waypointsVisible = !state.waypointsVisible;
  const btn = document.getElementById('btn-toggle-wp');
  btn.textContent = state.waypointsVisible ? '👁 Waypoints' : '👁‍🗨 Waypoints';
  btn.style.opacity = state.waypointsVisible ? '1' : '0.5';

  state.stops.forEach(s => {
    if (s.isWaypoint && s.marker) {
      if (state.waypointsVisible) {
        s.marker.addTo(map);
      } else {
        map.removeLayer(s.marker);
      }
    }
  });
  setStatus(state.waypointsVisible ? '◆ Waypoints visible' : '◆ Waypoints hidden');
}

// ════════════════════════════════════════════
//  MAP CLICK
// ════════════════════════════════════════════
function onMapClick(e) {
  if (state.tool === 'stop') {
    openStopPopup(e.latlng, false);
  } else if (state.tool === 'waypoint') {
    openStopPopup(e.latlng, true);
  }
}

function openStopPopup(latlng, isWaypoint) {
  const id = ++state.stopIdCounter;
  const popup = L.popup({ closeOnClick: false, autoClose: false })
    .setLatLng(latlng)
    .setContent(buildStopPopupHTML(id, isWaypoint))
    .openOn(map);

  window._pendingStop = { id, latlng, popup, isWaypoint };

  if (!isWaypoint) {
    setTimeout(() => {
      window._popupChips[`${id}-local`] = true;
      const el = document.getElementById(`ps-local-${id}`);
      if (el) {
        el.style.opacity = '1';
        el.style.background = '#22c55e';
        el.style.color = '#000';
      }
    }, 0);
  }
}

function buildStopPopupHTML(id, isWaypoint) {
  if (isWaypoint) {
    return `
      <div style="min-width:180px;">
        <div style="font-weight:700;font-size:13px;margin-bottom:8px;color:#c4b5fd;">◆ Configure Waypoint</div>
        <div style="font-size:11px;color:#9ca3af;margin-bottom:3px;">Label (optional)</div>
        <input id="ps-name-${id}" type="text" placeholder="e.g. Turn at 3rd Ave"
          style="width:100%;background:#0f1117;border:1px solid #2c2f3f;border-radius:5px;
                 color:#e8eaf0;font-size:12px;padding:5px 8px;margin-bottom:8px;outline:none;" />
        <div style="font-size:10px;color:#6b7280;margin-bottom:8px;">Waypoints guide the bus path but are not passenger stops.</div>
        <button onclick="confirmStop(${id})"
          style="width:100%;background:#8b5cf6;color:#fff;border:none;border-radius:6px;
                 padding:6px;font-size:12px;font-weight:700;cursor:pointer;">
          Place Waypoint
        </button>
      </div>`;
  }
  return `
    <div style="min-width:180px;">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px;">Configure Stop</div>
      <div style="font-size:11px;color:#9ca3af;margin-bottom:3px;">Stop Name</div>
      <input id="ps-name-${id}" type="text" placeholder="e.g. 1st Av/1st St"
        style="width:100%;background:#0f1117;border:1px solid #2c2f3f;border-radius:5px;
               color:#e8eaf0;font-size:12px;padding:5px 8px;margin-bottom:8px;outline:none;" />
      <div style="font-size:11px;color:#9ca3af;margin-bottom:5px;">Service types at this stop</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <div class="chip local"    id="ps-local-${id}"   onclick="togglePopupChip(${id},'local')"   style="opacity:0.45;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #22c55e;color:#22c55e;cursor:pointer;">Local</div>
        <div class="chip limited"  id="ps-limited-${id}" onclick="togglePopupChip(${id},'limited')" style="opacity:0.45;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #f59e0b;color:#f59e0b;cursor:pointer;">Limited</div>
        <div class="chip sbs"      id="ps-sbs-${id}"     onclick="togglePopupChip(${id},'sbs')"     style="opacity:0.45;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #3b82f6;color:#3b82f6;cursor:pointer;">SBS</div>
      </div>
      <button onclick="confirmStop(${id})"
        style="width:100%;background:#f5a623;color:#000;border:none;border-radius:6px;
               padding:6px;font-size:12px;font-weight:700;cursor:pointer;">
        Place Stop
      </button>
    </div>`;
}

window._popupChips = {};
function togglePopupChip(id, type) {
  const key = `${id}-${type}`;
  const el = document.getElementById(`ps-${type}-${id}`);
  if (!el) return;
  const on = !window._popupChips[key];
  window._popupChips[key] = on;
  el.style.opacity = on ? '1' : '0.45';
  const bg = type === 'local' ? '#22c55e' : type === 'limited' ? '#f59e0b' : '#3b82f6';
  el.style.background = on ? bg : 'transparent';
  el.style.color = on ? (type === 'sbs' ? '#fff' : '#000') : bg;
}

// Create and attach a Leaflet marker for a stop/waypoint object (mutates stop.marker).
// Used both when placing new stops and when reconstructing from a loaded save file.
function createStopMarker(stop) {
  if (stop.isWaypoint) {
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:10px;height:10px;
        background:#8b5cf6;
        transform:rotate(45deg);
        border:1.5px solid #fff;
        box-shadow:0 0 4px rgba(139,92,246,0.7);
      "></div>`,
      iconSize: [10,10],
      iconAnchor: [5,5],
    });
    stop.marker = L.marker([stop.lat, stop.lng], { icon, draggable: true })
      .addTo(map)
      .bindTooltip(`◆ ${stop.name}`, { permanent: false, direction: 'top', offset: [0,-8] });
    stop.marker.on('dragend', () => {
      const ll = stop.marker.getLatLng();
      stop.lat = ll.lat; stop.lng = ll.lng;
      redrawRouteLines();
    });
    stop.marker.on('click', () => handleRouteMapPick(stop.id));
    stop.marker.on('contextmenu', () => deleteStop(stop.id));
    if (!state.waypointsVisible) map.removeLayer(stop.marker);
    return;
  }

  const color = typeColor(stop.types[0]);
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:${color};border:2px solid #fff;
      box-shadow:0 0 4px rgba(0,0,0,0.6);
    "></div>`,
    iconSize: [14,14],
    iconAnchor: [7,7],
  });

  stop.marker = L.marker([stop.lat, stop.lng], { icon, draggable: true })
    .addTo(map)
    .bindTooltip(stop.name, { permanent: false, direction: 'top', offset: [0,-8] });

  stop.marker.on('dragend', () => {
    const ll = stop.marker.getLatLng();
    stop.lat = ll.lat; stop.lng = ll.lng;
    redrawRouteLines();
  });
  
  stop.marker.on('click', () => handleRouteMapPick(stop.id));

  stop.marker.on('contextmenu', (e) => {
    L.DomEvent.stopPropagation(e);
    openEditStopPopup(stop);
  });
}

function confirmStop(id) {
  const p = window._pendingStop;
  if (!p || p.id !== id) return;

  const nameEl = document.getElementById(`ps-name-${id}`);
  const name = nameEl ? nameEl.value.trim() : '';

  if (p.isWaypoint) {
    const label = name || `Waypoint ${id}`;
    const stop = {
      id,
      name: label,
      lat: p.latlng.lat,
      lng: p.latlng.lng,
      types: ['local', 'limited', 'sbs'], // waypoints are eligible for all route types
      marker: null,
      isWaypoint: true,
    };
    createStopMarker(stop);
    state.stops.push(stop);
    map.closePopup();
    renderStopList();
    setStatus(`◆ Waypoint "${label}" placed`);
    return;
  }

  if (!name) { alert('Please enter a stop name.'); return; }
  const types = ['local','limited','sbs'].filter(t => window._popupChips[`${id}-${t}`]);
  if (!types.length) { alert('Select at least one service type.'); return; }

  const stop = {
    id,
    name,
    lat: p.latlng.lat,
    lng: p.latlng.lng,
    types,
    marker: null,
    isWaypoint: false,
  };

  createStopMarker(stop);
  state.stops.push(stop);
  map.closePopup();
  renderStopList();
  renderRouteList();
  setStatus(`✅ Stop "${name}" added (${types.join(', ')})`);
}

// ════════════════════════════════════════════
//  STOP EDITING (right-click on marker)
// ════════════════════════════════════════════
function openEditStopPopup(stop) {
  const typesChecked = (t) => stop.types.includes(t)
    ? `style="opacity:1;background:${t==='sbs'?'#3b82f6':t==='limited'?'#f59e0b':'#22c55e'};color:${t==='sbs'?'#fff':'#000'};"`
    : `style="opacity:0.45;"`;

  const html = `
    <div style="min-width:190px;">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px;">✏️ Edit Stop</div>
      <div style="font-size:11px;color:#9ca3af;margin-bottom:3px;">Name</div>
      <input id="es-name-${stop.id}" type="text" value="${stop.name}"
        style="width:100%;background:#0f1117;border:1px solid #2c2f3f;border-radius:5px;
               color:#e8eaf0;font-size:12px;padding:5px 8px;margin-bottom:8px;outline:none;" />
      <div style="font-size:11px;color:#9ca3af;margin-bottom:5px;">Service types</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;">
        <div id="es-local-${stop.id}" onclick="toggleEditChip(${stop.id},'local')"
          class="chip local" ${typesChecked('local')}
          style="padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #22c55e;cursor:pointer;">Local</div>
        <div id="es-limited-${stop.id}" onclick="toggleEditChip(${stop.id},'limited')"
          class="chip limited" ${typesChecked('limited')}
          style="padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #f59e0b;cursor:pointer;">Limited</div>
        <div id="es-sbs-${stop.id}" onclick="toggleEditChip(${stop.id},'sbs')"
          class="chip sbs" ${typesChecked('sbs')}
          style="padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #3b82f6;cursor:pointer;">SBS</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button onclick="saveStopEdit(${stop.id})"
          style="flex:1;background:#f5a623;color:#000;border:none;border-radius:6px;
                 padding:6px;font-size:12px;font-weight:700;cursor:pointer;">Save</button>
        <button onclick="deleteStop(${stop.id});map.closePopup();"
          style="flex:1;background:#ef4444;color:#fff;border:none;border-radius:6px;
                 padding:6px;font-size:12px;font-weight:700;cursor:pointer;">Delete</button>
      </div>
    </div>`;

  // Pre-populate edit chips state
  window._editChips = window._editChips || {};
  ['local','limited','sbs'].forEach(t => {
    window._editChips[`${stop.id}-${t}`] = stop.types.includes(t);
  });

  L.popup({ closeOnClick: false, autoClose: false })
    .setLatLng([stop.lat, stop.lng])
    .setContent(html)
    .openOn(map);
}

window._editChips = {};
function toggleEditChip(stopId, type) {
  const key = `${stopId}-${type}`;
  const el = document.getElementById(`es-${type}-${stopId}`);
  if (!el) return;
  const on = !window._editChips[key];
  window._editChips[key] = on;
  el.style.opacity = on ? '1' : '0.45';
  const bg = type === 'local' ? '#22c55e' : type === 'limited' ? '#f59e0b' : '#3b82f6';
  el.style.background = on ? bg : 'transparent';
  el.style.color = on ? (type === 'sbs' ? '#fff' : '#000') : bg;
}

function saveStopEdit(stopId) {
  const stop = state.stops.find(s => s.id === stopId);
  if (!stop) return;
  const nameEl = document.getElementById(`es-name-${stopId}`);
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { alert('Please enter a stop name.'); return; }
  const types = ['local','limited','sbs'].filter(t => window._editChips[`${stopId}-${t}`]);
  if (!types.length) { alert('Select at least one service type.'); return; }

  stop.name = name;
  stop.types = types;

  // Update marker tooltip
  if (stop.marker) {
    stop.marker.unbindTooltip();
    stop.marker.bindTooltip(name, { permanent: false, direction: 'top', offset: [0,-8] });
    // Update marker color
    const color = typeColor(types[0]);
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,0.6);"></div>`,
      iconSize: [14,14], iconAnchor: [7,7],
    });
    stop.marker.setIcon(icon);
  }

  map.closePopup();
  renderStopList();
  renderRouteList();
  redrawRouteLines();
  setStatus(`✏️ Stop "${name}" updated`);
}

function typeColor(t) {
  return t === 'sbs' ? '#3b82f6' : t === 'limited' ? '#f59e0b' : '#22c55e';
}

function deleteStop(id) {
  const idx = state.stops.findIndex(s => s.id === id);
  if (idx === -1) return;
  const stop = state.stops[idx];
  if (stop.marker) map.removeLayer(stop.marker);
  state.stops.splice(idx, 1);
  state.routes.forEach(r => {
    r.sideA = r.sideA.filter(sid => sid !== id);
    r.sideB = r.sideB.filter(sid => sid !== id);
  });
  redrawRouteLines();
  renderStopList();
  renderRouteList();
}

// ════════════════════════════════════════════
//  STOP LIST RENDER
// ════════════════════════════════════════════
function renderStopList() {
  const el = document.getElementById('stop-list');
  const allStops = state.stops;
  if (!allStops.length) {
    el.innerHTML = '<div class="empty">No stops placed yet.<br/>Select "Add Stop" and click the map.</div>';
    return;
  }
  el.innerHTML = allStops.map(s => {
    if (s.isWaypoint) {
      return `
        <div class="stop-item" onclick="focusStop(${s.id})" style="border-color:#4c1d95;">
          <div class="stop-dot" style="background:#8b5cf6;border-radius:2px;transform:rotate(45deg);"></div>
          <span class="stop-name" style="color:#c4b5fd;">◆ ${s.name}</span>
          <span style="font-size:9px;color:#8b5cf6;font-weight:700;">WP</span>
          <button class="del-btn" onclick="event.stopPropagation();deleteStop(${s.id})">✕</button>
        </div>`;
    }
    return `
      <div class="stop-item" onclick="focusStop(${s.id})">
        <div class="stop-dot" style="background:${typeColor(s.types[0])};"></div>
        <span class="stop-name">${s.name}</span>
        <span class="stop-tags">${s.types.map(t => `<span class="tag ${t}">${t.toUpperCase()}</span>`).join('')}</span>
        <button class="del-btn" onclick="event.stopPropagation();deleteStop(${s.id})">✕</button>
      </div>`;
  }).join('');
}

function focusStop(id) {
  const s = state.stops.find(x => x.id === id);
  if (s) map.setView([s.lat, s.lng], 16);
}

// ════════════════════════════════════════════
//  ROUTE MANAGEMENT
// ════════════════════════════════════════════
function openNewRouteForm() {
  switchTab('routes');
  document.getElementById('new-route-form').style.display = 'block';
}
function closeNewRouteForm() {
  document.getElementById('new-route-form').style.display = 'none';
}

function selectRouteType(t) {
  selectedRouteType = t;
  document.querySelectorAll('#nr-type-chips .chip').forEach(c => c.classList.remove('selected'));
  document.querySelector(`#nr-type-chips .chip.${t}`).classList.add('selected');
}

function createRoute() {
  const name  = document.getElementById('nr-name').value.trim();
  const color = document.getElementById('nr-color').value;
  const buses = parseInt(document.getElementById('nr-buses').value) || 1;
  if (!name) { alert('Enter a route name.'); return; }

  const route = {
    id: ++state.routeIdCounter,
    name,
    type: selectedRouteType,
    color,
    buses,          // kept for save/load compat
    fleetList: [],
    fleetIdCounter: 0,
    sideA: [],   // array of stopIds (stops + waypoints)
    sideB: [],
    polyA: null,
    polysA: [],
    polyB: null,
    polysB: [],
    activeSide: 'A',
  };
  state.routes.push(route);
  closeNewRouteForm();
  document.getElementById('nr-name').value = '';
  renderRouteList();
  setStatus(`🛣 Route "${name}" created — add stops in Routes tab`);
}

function deleteRoute(id) {
  const idx = state.routes.findIndex(r => r.id === id);
  if (idx === -1) return;
  const r = state.routes[idx];
  if (!confirm(`Delete route "${r.name}"? This cannot be undone.`)) return;
  if (r.polyA) map.removeLayer(r.polyA);
  if (r.polysA) r.polysA.forEach(p => map.removeLayer(p));
  if (r.polyB) map.removeLayer(r.polyB);
  if (r.polysB) r.polysB.forEach(p => map.removeLayer(p));
  state.routes.splice(idx, 1);
  renderRouteList();
  setStatus(`🗑 Route "${r.name}" deleted`);
}

function removeStopFromSide(routeId, side, stopId) {
  const r = state.routes.find(x => x.id === routeId);
  if (!r) return;
  const arr = side === 'A' ? r.sideA : r.sideB;
  const idx = arr.indexOf(stopId);
  if (idx !== -1) {
    arr.splice(idx, 1);
    redrawRouteLines();
    rerenderRouteBody(routeId);
  }
}

function setActiveSide(routeId, side) {
  const r = state.routes.find(x => x.id === routeId);
  if (r) {
    r.activeSide = side;
    // Exit pick mode if it's active for this route — picking was for the old side
    if (window._routePickMode.active && window._routePickMode.routeId === routeId) {
      window._routePickMode.active = false;
      window._routePickMode.routeId = null;
      window._routePickMode.side = null;
      setStatus(`Switched to Side ${side} — pick mode exited.`);
    }
    rerenderRouteBody(routeId);
  }
}

// Inline edit for seq items (rename stop within route context)
function openSeqEdit(routeId, side, stopId) {
  editingSeqItem = { routeId, side, stopId };
  rerenderRouteBody(routeId);
}
function closeSeqEdit(routeId) {
  editingSeqItem = null;
  rerenderRouteBody(routeId);
}
function saveSeqEdit(routeId, stopId) {
  const stop = state.stops.find(s => s.id === stopId);
  if (!stop) return;
  const nameEl = document.getElementById(`seq-edit-name-${stopId}`);
  if (nameEl && nameEl.value.trim()) {
    stop.name = nameEl.value.trim();
    if (stop.marker) {
      stop.marker.unbindTooltip();
      stop.marker.bindTooltip(stop.name, { permanent: false, direction: 'top', offset: [0,-8] });
    }
  }
  renderStopList();
  editingSeqItem = null;
  rerenderRouteBody(routeId);
}

map.on('zoomstart', () => {
  state.simBuses.forEach(bus => {
    if (bus.marker) {
      const p = bus.marker.getLatLng();
      bus.marker.setLatLng(p);
    }
  });
});

// ════════════════════════════════════════════
//  SELECTIVE RE-RENDER (keeps panel open!)
// ════════════════════════════════════════════
function rerenderRouteBody(routeId) {
  const r = state.routes.find(x => x.id === routeId);
  if (!r) return;
  const bodyEl = document.getElementById(`rb-${r.id}`);
  if (!bodyEl) { renderRouteList(); return; }
  // Rebuild just this route's body content
  bodyEl.innerHTML = buildRouteBody(r);
}

function buildRouteBody(r) {
  const side = r.activeSide;
  const arr  = side === 'A' ? r.sideA : r.sideB;

  // Eligible: stops matching route type OR waypoints (always eligible)
  const eligible = state.stops.filter(s => s.isWaypoint || s.types.includes(r.type));
  const searchTerm = (window._routeSearch?.[r.id] || '').toLowerCase().trim();

  const seqHTML = arr.length
    ? arr.map((sid, i) => {
        const s = state.stops.find(x => x.id === sid);
        if (!s) return '';
        // If this item is being edited
        if (editingSeqItem &&
            editingSeqItem.routeId === r.id &&
            editingSeqItem.side === side &&
            editingSeqItem.stopId === sid) {
          return `
            <div class="seq-edit-row">
              <div style="font-size:10px;color:var(--muted);margin-bottom:2px;">Editing: ${s.name}</div>
              <input type="text" id="seq-edit-name-${sid}" value="${s.name}" placeholder="Stop name" />
              <div class="seq-edit-btns">
                <button class="btn btn-accent" onclick="saveSeqEdit(${r.id},${sid})">Save</button>
                <button class="btn btn-muted" onclick="closeSeqEdit(${r.id})">Cancel</button>
              </div>
            </div>`;
        }
        const wpBadge = s.isWaypoint
          ? `<span class="seq-type-badge waypoint">WP</span>`
          : `<span class="seq-type-badge">${s.types[0].toUpperCase()}</span>`;
        return `<div class="seq-item" onclick="openSeqEdit(${r.id},'${side}',${sid})">
          <span class="seq-num">${i+1}</span>
          <span class="seq-name" style="${s.isWaypoint?'color:#c4b5fd;':''}">${s.isWaypoint?'◆ ':''}${s.name}</span>
          ${wpBadge}
          <button class="seq-remove" onclick="event.stopPropagation();removeStopFromSide(${r.id},'${side}',${sid})">✕</button>
        </div>`;
      }).join('')
    : '<div style="font-size:11px;color:var(--muted);padding:4px 0;">No stops added yet.</div>';

  const filteredEligible = eligible.filter(s =>
    !searchTerm || s.name.toLowerCase().includes(searchTerm)
  );
  const stopItems = filteredEligible.filter(s=>!s.isWaypoint);
  const waypointItems = filteredEligible.filter(s=>s.isWaypoint);

  function buildSelectable(items){
    return items.filter(s => !arr.includes(s.id)).map(s => {
      const label = `${s.isWaypoint?'◆ ':''}${s.name}${s.isWaypoint?'':' ('+s.types.join('/')+')'}`;
      return `
      <div class="multi-add-item"
        onmouseenter="highlightStopMarker(${s.id})"
        onmouseleave="clearHighlightStopMarker(${s.id})"
        onclick="quickAddToSide(${r.id},${s.id})"
        style="display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;font-size:11px;cursor:pointer;">
        <span style="flex:1;${s.isWaypoint?'color:#c4b5fd;':''}">${label}</span>
        <span class="multi-add-hint" style="font-size:10px;color:var(--muted);transition:color 0.1s;">+ add</span>
      </div>`;
    }).join('');
  }

  const optHTML = `
    <input class="route-search" type="text" placeholder="🔍 Search stops and waypoints..."
      value="${window._routeSearch?.[r.id] || ''}"
      oninput="updateRouteSearch(${r.id}, this.value)" />
    <div class="route-section-title">BUS STOPS (${stopItems.length})</div>
    ${buildSelectable(stopItems) || '<div style="font-size:11px;color:var(--muted);padding:4px;">No matching stops</div>'}
    <div class="route-section-title">WAYPOINTS (${waypointItems.length})</div>
    ${buildSelectable(waypointItems) || '<div style="font-size:11px;color:var(--muted);padding:4px;">No matching waypoints</div>'}
  `;

  return `
    <div class="side-tabs">
      <div class="side-tab ${side==='A'?'active':''}" onclick="setActiveSide(${r.id},'A')">Side A</div>
      <div class="side-tab ${side==='B'?'active':''}" onclick="setActiveSide(${r.id},'B')">Side B</div>
    </div>

    <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">Click a stop in the list to rename it. Right-click map markers to edit.</div>

    <div class="stop-sequence">${seqHTML}</div>

    <div class="card" style="padding:6px 8px;">
      <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">
        Click a stop or waypoint below to add it to the sequence.
      </div>
      <div style="max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;">
        ${optHTML}
      </div>
      <div style="display:flex;gap:6px;margin-top:6px;">
        <button class="btn btn-purple" style="flex:1;font-size:11px;"
          onclick="window._routePickMode.active && window._routePickMode.routeId===${r.id} ? stopRouteMapPick(${r.id}) : startRouteMapPick(${r.id},'${r.activeSide}')">
          ${window._routePickMode && window._routePickMode.active && window._routePickMode.routeId===r.id ? '🛑 Stop Picking' : '📍 Pick On Map'}
        </button>
      </div>
    </div>

    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:6px;">🚌 Fleet</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:6px;">
        ${buildFleetHTML(r)}
      </div>
      <div style="display:flex;gap:4px;">
<button class="btn btn-accent" style="flex:1;font-size:11px;" onclick="spawnBus(${r.id},'local')">+ Local</button>
<button class="btn btn-muted" style="flex:1;font-size:11px;" onclick="spawnBus(${r.id},'limited')">+ Limited</button>
<button class="btn btn-purple" style="flex:1;font-size:11px;" onclick="spawnBus(${r.id},'sbs')">+ SBS</button>
</div>
    </div>

    <div style="margin-top:8px;display:flex;gap:6px;">
      <button class="btn btn-muted" style="flex:1;font-size:11px;"
        onclick="map.fitBounds(getRouteBounds(${r.id}))">🗺 Focus</button>
      <button class="btn btn-danger" style="flex:1;font-size:11px;"
        onclick="deleteRoute(${r.id})">🗑 Delete</button>
    </div>`;
}

// ════════════════════════════════════════════
//  FLEET MANAGEMENT
// ════════════════════════════════════════════
function buildFleetHTML(r) {
  if (!r.fleetList || !r.fleetList.length) {
    return '<div style="font-size:11px;color:var(--muted);">No buses. Click Spawn Bus.</div>';
  }
  const TC = t => t==='sbs'?'#3b82f6':t==='limited'?'#f59e0b':'#22c55e';
  const TL = t => t==='sbs'?'SBS':t==='limited'?'Ltd':'Lcl';
  return r.fleetList.map((b, i) => {
    return `<div class="fleet-item">
      <span class="fleet-label">Bus ${i+1}</span>
      ${['local','limited','sbs'].map(t => {
        const active = b.serviceType === t;
        return `<button class="fleet-type-btn"
          style="background:${active ? TC(t) : 'var(--surface)'};
                 color:${active ? (t==='sbs'?'#fff':'#000') : 'var(--muted)'};
                 border-color:${active ? TC(t) : 'var(--border)'};"
          onclick="setBusServiceType(${r.id},${b.id},'${t}')">${TL(t)}</button>`;
      }).join('')}
      <button class="seq-remove" onclick="removeBus(${r.id},${b.id})">✕</button>
    </div>`;
  }).join('');
}

function spawnBus(routeId, serviceType='local') {
  const r = state.routes.find(x => x.id === routeId);
  if (!r) return;
  if (!r.fleetList) r.fleetList = [];
  if (!r.fleetIdCounter) r.fleetIdCounter = r.fleetList.length;
  r.fleetIdCounter++;
  const busConfig = { id: r.fleetIdCounter, serviceType: serviceType || r.type };
  r.fleetList.push(busConfig);
  rerenderRouteBody(routeId);

  // If simulation is running, immediately add a live bus starting at position 0
  if (state.simRunning) {
    const svcType = busConfig.serviceType || r.type;
    const loopData = buildBusLoop(r, svcType);
    if (loopData) {
      const { fullLoop, segDistances } = loopData;
      const startPt = fullLoop[0];
      const { bgColor, icon } = makeBusMarker(r, svcType);
      const bus = {
        routeId:        r.id,
        busFleetId:     busConfig.id,
        color:          bgColor,
        serviceType:    svcType,
        type:           r.type,
        name:           r.name,
        loop:           fullLoop,
        loopLen:        fullLoop.length,
        segDistances,
        segIdx:         0,
        t:              0,
        dwellRemaining: 0,
        delayRemaining: 0, // live-spawned buses start immediately from stop 1
        marker: L.marker([startPt.lat, startPt.lng], { icon, zIndexOffset: 500 })
          .addTo(map)
          .bindTooltip(`${r.name} · ${svcType.toUpperCase()}`, { permanent: false, direction: 'top' }),
      };
      state.simBuses.push(bus);
      setStatus(`🚌 Bus spawned on ${r.name} — departing from Side A start`);
      return;
    }
  }

  setStatus(`🚌 Bus ${r.fleetList.length} added to ${r.name}`);
}

function removeBus(routeId, busId) {
  const r = state.routes.find(x => x.id === routeId);
  if (!r || !r.fleetList) return;
  r.fleetList = r.fleetList.filter(b => b.id !== busId);
  rerenderRouteBody(routeId);
}


function setBusServiceType(routeId, busId, type) {
  const r = state.routes.find(x => x.id === routeId);
  if (!r || !r.fleetList) return;
  const b = r.fleetList.find(x => x.id === busId);
  if (b) { b.serviceType = type; rerenderRouteBody(routeId); }
}

//  CLICK-TO-ADD STOP TO ROUTE SIDE

function quickAddToSide(routeId, stopId) {
  const r = state.routes.find(x => x.id === routeId);
  if (!r) return;
  const arr = r.activeSide === 'A' ? r.sideA : r.sideB;
  if (arr.includes(stopId)) return; // already in sequence, no-op
  arr.push(stopId);
  const s = state.stops.find(x => x.id === stopId);
  redrawRouteLines();
  rerenderRouteBody(routeId);
  setStatus(`✅ Added "${s?.name || stopId}" to Side ${r.activeSide}`);
}

// ════════════════════════════════════════════
//  ROUTE LINES ON MAP
//  - Side B: dashed ONLY where it diverges from Side A
//  - Overlapping routes (same edge shared by multiple routes/sides)
//    are drawn as parallel offset lines so they don't stack
//  - Hover shows a stats tooltip (length, bus count) for that route
// ════════════════════════════════════════════

const EDGE_OFFSET_PX = 5; // pixel spacing between parallel overlapping lines

function redrawRouteLines() {
  // First pass: clear all existing layers
  state.routes.forEach(r => {
    if (r.polyA) { map.removeLayer(r.polyA); r.polyA = null; }
    if (r.polysA) { r.polysA.forEach(p => map.removeLayer(p)); }
    r.polysA = [];
    if (r.polysB) { r.polysB.forEach(p => map.removeLayer(p)); }
    r.polysB = [];
  });

  const toLatLng = id => {
    const s = state.stops.find(x => x.id === id);
    return s ? [s.lat, s.lng] : null;
  };

  // Build edge usage map: key = "lat1,lng1|lat2,lng2" (order-independent)
  // value = array of { routeId, side } using that edge, in a stable order
  const edgeUsage = new Map();

  function edgeKey(p1, p2) {
    const a = latLngKey(p1), b = latLngKey(p2);
    return a < b ? `${a}|${b}` : `${b}|${a}`;
  }

  state.routes.forEach(r => {
    const coordsA = r.sideA.map(toLatLng).filter(Boolean);
    const coordsB = r.sideB.map(toLatLng).filter(Boolean);
    [['A', coordsA], ['B', coordsB]].forEach(([side, coords]) => {
      for (let i = 0; i < coords.length - 1; i++) {
        const key = edgeKey(coords[i], coords[i+1]);
        if (!edgeUsage.has(key)) edgeUsage.set(key, []);
        const arr = edgeUsage.get(key);
        // avoid double-counting if A and B of the SAME route share the
        // exact same edge twice — still list separately so it gets offset
        arr.push({ routeId: r.id, side, color: r.color });
      }
    });
  });

  state.routes.forEach(r => {
    const coordsA = r.sideA.map(toLatLng).filter(Boolean);
    const coordsB = r.sideB.map(toLatLng).filter(Boolean);

    if (coordsA.length > 1) {
      drawSideWithOffsets(r, coordsA, 'A', edgeUsage, edgeKey);
    }
    if (coordsB.length > 1) {
      drawSideBWithBranching(r, coordsB, coordsA, edgeUsage, edgeKey);
    }
  });
}

// Build a Set of "lat,lng" strings from Side A for quick lookup
function latLngKey(coord) {
  return coord[0].toFixed(6) + ',' + coord[1].toFixed(6);
}

// Compute a perpendicular pixel offset for an edge given how many routes
// share it and this route's rank among them.
function getEdgeOffset(p1, p2, routeId, side, edgeUsage, edgeKey) {
  const key = edgeKey(p1, p2);
  const sharers = edgeUsage.get(key) || [];
  if (sharers.length <= 1) return [0, 0];

  // Stable order: sort by routeId then side so all routes agree on ranks
  const sorted = [...sharers].sort((a, b) =>
    a.routeId !== b.routeId ? a.routeId - b.routeId : a.side.localeCompare(b.side)
  );
  // Find THIS entry's rank (handle duplicate routeId+side by using first match
  // not yet consumed — simple approach: find index of first match)
  let rank = sorted.findIndex(s => s.routeId === routeId && s.side === side);
  if (rank === -1) rank = 0;

  const n = sorted.length;
  // Center the offsets around 0: ranks -((n-1)/2) .. +((n-1)/2)
  const centeredRank = rank - (n - 1) / 2;

  // Perpendicular direction in screen pixels
  const pt1 = map.latLngToLayerPoint(p1);
  const pt2 = map.latLngToLayerPoint(p2);
  const dx = pt2.x - pt1.x, dy = pt2.y - pt1.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  // Perpendicular unit vector
  const px = -dy / len, py = dx / len;

  const offsetPx = centeredRank * EDGE_OFFSET_PX;
  return [px * offsetPx, py * offsetPx];
}

// Apply per-edge pixel offsets to a coordinate path, returning a new
// lat/lng path where each point is nudged based on the offsets of its
// adjacent edges (averaged at shared vertices for a smooth line).
function applyEdgeOffsets(coords, routeId, side, edgeUsage, edgeKey) {
  if (coords.length < 2) return coords;
  const n = coords.length;
  const pointOffsets = coords.map(() => [0, 0]);

  for (let i = 0; i < n - 1; i++) {
    const [ox, oy] = getEdgeOffset(coords[i], coords[i+1], routeId, side, edgeUsage, edgeKey);
    // Accumulate offset onto both endpoints of this edge
    pointOffsets[i][0]   += ox; pointOffsets[i][1]   += oy;
    pointOffsets[i+1][0] += ox; pointOffsets[i+1][1] += oy;
  }
  // Average offsets at interior points (each touched by 2 edges)
  for (let i = 1; i < n - 1; i++) {
    pointOffsets[i][0] /= 2;
    pointOffsets[i][1] /= 2;
  }

  return coords.map((c, i) => {
    const pt = map.latLngToLayerPoint(c);
    const shifted = L.point(pt.x + pointOffsets[i][0], pt.y + pointOffsets[i][1]);
    const ll = map.layerPointToLatLng(shifted);
    return [ll.lat, ll.lng];
  });
}

// Build the stats tooltip HTML for a route (length in miles + bus count)
function buildRouteStatsTooltip(r, coordsA, coordsB) {
  const lenMeters = (coords) => {
    let total = 0;
    for (let i = 0; i < coords.length - 1; i++) {
      total += map.distance(coords[i], coords[i+1]);
    }
    return total;
  };
  const milesA = lenMeters(coordsA) / 1609.344;
  const milesB = lenMeters(coordsB) / 1609.344;
  const totalMiles = milesA + milesB;

  return `
    <div style="font-size:11px;line-height:1.5;">
      <div style="font-weight:800;color:${r.color};margin-bottom:2px;">${r.name}</div>
      <div><strong>Type:</strong> ${r.type.toUpperCase()}</div>
      <div><strong>Side A:</strong> ${milesA.toFixed(2)} mi</div>
      <div><strong>Side B:</strong> ${milesB.toFixed(2)} mi</div>
      <div><strong>Total:</strong> ${totalMiles.toFixed(2)} mi</div>
      <div><strong>Buses:</strong> ${r.fleetList ? r.fleetList.length : r.buses}</div>
    </div>`;
}

function drawSideWithOffsets(r, coordsA, side, edgeUsage, edgeKey) {
  const offsetCoords = applyEdgeOffsets(coordsA, r.id, side, edgeUsage, edgeKey);
  // Need original (un-offset) coords to compute true stats
  const coordsBForStats = r.sideB.map(id => {
    const s = state.stops.find(x => x.id === id);
    return s ? [s.lat, s.lng] : null;
  }).filter(Boolean);

  r.polyA = L.polyline(offsetCoords, {
    color: r.color, weight: 4, opacity: 0.85,
    dashArray: r.type === 'limited' ? '8,6' : null,
  }).addTo(map).bindTooltip(() => buildRouteStatsTooltip(r, coordsA, coordsBForStats), { sticky: true });
}

function drawSideBWithBranching(r, coordsB, coordsA, edgeUsage, edgeKey) {
  const aSet = new Set(coordsA.map(latLngKey));
  const offsetCoordsB = applyEdgeOffsets(coordsB, r.id, 'B', edgeUsage, edgeKey);

  // Walk coordsB, grouping consecutive points into "shared" vs "diverged" segments
  // (use original coordsB for membership test, offsetCoordsB for drawing)
  let currentGroup = [];
  let currentShared = aSet.has(latLngKey(coordsB[0]));

  function flushGroup(isShared) {
    if (currentGroup.length < 2) return;
    const poly = L.polyline(currentGroup, {
      color: r.color,
      weight: isShared ? 4 : 3,
      opacity: isShared ? 0.6 : 0.85,
      dashArray: isShared ? null : '6,5',
    }).addTo(map).bindTooltip(() => buildRouteStatsTooltip(r, coordsA, coordsB), { sticky: true });
    r.polysB.push(poly);
  }

  for (let i = 0; i < coordsB.length; i++) {
    const pt = coordsB[i];
    const offsetPt = offsetCoordsB[i];
    const shared = aSet.has(latLngKey(pt));

    if (shared !== currentShared) {
      // Flush previous group — carry over the boundary point to avoid gaps
      if (currentGroup.length > 0) {
        currentGroup.push(offsetPt); // add connecting point
        flushGroup(currentShared);
      }
      currentGroup = [offsetPt];
      currentShared = shared;
    } else {
      currentGroup.push(offsetPt);
    }
  }
  flushGroup(currentShared);
}

function getRouteBounds(id) {

    return s ? [s.lat, s.lng] : null;
  }).filter(Boolean);
  return coords.length ? L.latLngBounds(coords) : null;
}

// ════════════════════════════════════════════
//  SMART BUS LABEL EXTRACTION
//  Pulls a short "code" from a route name for the bus icon.
//  e.g. "Bx40 Throggs Neck/RPT via 180 St" -> "Bx40"
//       "Wyoming10934 to Alaska" -> "Wyoming10934"
//       "Crosstown Express" -> "Crosstown" (no digits, fallback to first word/truncation)
// ════════════════════════════════════════════
function getBusLabel(name) {
  if (!name) return '';
  const trimmed = name.trim();

  // Leading letters (optional) immediately followed by digits, e.g. "Bx40", "Wyoming10934", "10934"
  const m = trimmed.match(/^([A-Za-z]*\d+)/);
  if (m) {
    let label = m[1];
    if (label.length > 10) label = label.slice(0, 10);
    return label;
  }

  // No leading number — find the first number group anywhere, with any
  // immediately-preceding letters (no spaces) attached
  const m2 = trimmed.match(/([A-Za-z]*)(\d+)/);
  if (m2) {
    let label = (m2[1] || '') + m2[2];
    if (label.length > 10) label = label.slice(0, 10);
    return label;
  }

  // No digits at all — fall back to the first word, truncated
  const firstWord = trimmed.split(/\s+/)[0];
  return firstWord.length > 10 ? firstWord.slice(0, 10) : firstWord;
}

// ════════════════════════════════════════════
//  SIMULATION  (A→B→A looping with waypoints)
// ════════════════════════════════════════════
function toggleSim() {
  state.simRunning ? stopSim() : startSim();
}

// ── helpers used by both startSim and spawnBus ──────────────────────────

function buildBusLoop(r, svcType) {
  const filterPts = pts => pts.filter(s => s.isWaypoint || (s.types && s.types.includes(svcType)));
  let pointsA = filterPts(r.sideA.map(id => state.stops.find(s => s.id === id)).filter(Boolean));
  let pointsB = filterPts(r.sideB.map(id => state.stops.find(s => s.id === id)).filter(Boolean));

  // Fallback: if a service pattern has too few eligible stops, use the route path.
  if (pointsA.length < 2) {
    pointsA = r.sideA.map(id => state.stops.find(s => s.id === id)).filter(Boolean);
  }
  if (pointsB.length < 2) {
    pointsB = r.sideB.map(id => state.stops.find(s => s.id === id)).filter(Boolean);
  }

  if (pointsA.length < 2 && pointsB.length < 2) return null;
  const fullLoop = buildLoopSequence(pointsA, pointsB);
  if (fullLoop.length < 2) return null;
  const segDistances = [];
  for (let k = 0; k < fullLoop.length - 1; k++) {
    const p1 = fullLoop[k], p2 = fullLoop[k+1];
    segDistances.push(map.distance([p1.lat, p1.lng], [p2.lat, p2.lng]) || 1);
  }
  return { fullLoop, segDistances };
}

function makeBusMarker(r, svcType) {
  const bgColor  = svcType==='sbs' ? '#3b82f6' : svcType==='limited' ? '#f59e0b' : r.color;
  const txtColor = svcType==='sbs' ? '#fff' : '#000';
  const label    = getBusLabel(r.name);
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      min-width:18px;height:18px;border-radius:4px;padding:0 3px;
      background:${bgColor};border:2px solid #fff;
      display:flex;align-items:center;justify-content:center;
      font-size:9px;font-weight:900;color:${txtColor};
      box-shadow:0 2px 6px rgba(0,0,0,0.7);white-space:nowrap;
    ">${label}</div>`,
    iconSize: [18,18], iconAnchor: [9,9],
  });
  return { bgColor, icon };
}

// Estimate total loop travel time in ticks at current speedMult
// (used to compute even headway delays between buses)
function loopDurationTicks(segDistances) {
  const TICK = 50;
  const metersPerTick = state.speedMult * 0.275;
  const totalMeters = segDistances.reduce((a, b) => a + b, 0);
  return Math.max(1, Math.round(totalMeters / metersPerTick));
}

function startSim() {
  if (state.simRunning) return;
  state.simRunning = true;
  document.getElementById('sim-btn').textContent = '■ Stop Simulation';
  document.getElementById('sim-btn').classList.add('running');

  state.simBuses = [];

  const TICK = 50;
  const DWELL_MS = 1500;

  state.routes.forEach(r => {

    // First simulation start: create fleet entries from bus count.
    if ((!r.fleetList || !r.fleetList.length) && (r.buses || 0) > 0) {
      r.fleetList = Array.from({length: r.buses}, (_, i) => ({
        id: i + 1,
        serviceType: r.type
      }));
      r.fleetIdCounter = r.buses;
    }

    const fleet = r.fleetList || [];
    const totalBuses = fleet.length;

    if (!totalBuses) return;

    fleet.forEach((busConfig, i) => {
      const svcType = busConfig.serviceType || r.type;
      const loopData = buildBusLoop(r, svcType);
      if (!loopData) return;

      const { fullLoop, segDistances } = loopData;
      const startPt = fullLoop[0]; // always start at the very first point of Side A

      const { bgColor, icon } = makeBusMarker(r, svcType);

      // Stagger buses using time-based delays so they are evenly headway-spaced.
      // Bus 0 departs immediately; bus i waits (i / totalBuses) of the full loop duration.
      const HEADWAY_SECONDS = 5;
      const delayTicks = i * Math.round((HEADWAY_SECONDS * 1000) / TICK);

      const bus = {
        routeId:        r.id,
        busFleetId:     busConfig.id,
        color:          bgColor,
        serviceType:    svcType,
        type:           r.type,
        name:           r.name,
        loop:           fullLoop,
        loopLen:        fullLoop.length,
        segDistances,
        segIdx:         0,
        t:              0,
        dwellRemaining: 0,
        delayRemaining: delayTicks, // ticks to wait before departing
        marker: (() => {
            const marker = L.marker(
            [startPt.lat, startPt.lng],
            { icon, zIndexOffset: 500 }
            ).bindTooltip(
            `${r.name} · ${svcType.toUpperCase()}`,
            { permanent:false, direction:'top' }
            );

        if (delayTicks === 0) {
            marker.addTo(map);
        }

        return marker;
        })(),
        };
      state.simBuses.push(bus);
    });
  });

  state.simInterval = setInterval(() => {
    const metersPerTick = state.speedMult * 0.275;
    state.simBuses.forEach(bus => {
      // Count down pre-departure delay — bus sits at first stop until released
      if (bus.delayRemaining > 0) {
          bus.delayRemaining--;
          // 1 second before departure
          if (
            !bus.visible &&
            bus.delayRemaining <= 20
          ) {
            bus.visible = true;
            bus.marker.addTo(map);
            const el = bus.marker.getElement();
        
            if (el) {
              el.style.opacity = '0';
              el.style.transition = 'opacity 1s ease';
        
              requestAnimationFrame(() => {
                el.style.opacity = '1';
              });
            }
            bus.fadedIn = true;
          }
          return;
        }
      // Dwell at a stop
      if (bus.dwellRemaining > 0) {
        bus.dwellRemaining -= TICK;
        return;
      }
      let remaining = metersPerTick;
      while (remaining > 0) {
        const segDist = bus.segDistances[bus.segIdx] || 1;
        const remainingInSeg = (1 - bus.t) * segDist;
        if (remaining < remainingInSeg) {
          bus.t += remaining / segDist;
          remaining = 0;
        } else {
          remaining -= remainingInSeg;
          bus.segIdx = (bus.segIdx + 1) % (bus.loopLen - 1);
          bus.t = 0;
          const arrivedAt = bus.loop[bus.segIdx];
          if (arrivedAt && !arrivedAt.isWaypoint) {
            bus.dwellRemaining = DWELL_MS;
            remaining = 0;
          }
        }
      }
      const a = bus.loop[bus.segIdx];
      const b = bus.loop[bus.segIdx + 1];
      if (!a || !b) return;
      const lat = a.lat + (b.lat - a.lat) * bus.t;
      const lng = a.lng + (b.lng - a.lng) * bus.t;
      bus.marker.setLatLng([lat, lng]);
    });
  }, TICK);

  setStatus('▶ Simulation running — buses depart from Side A start with even headways!');
}

// Build a seamless A→B→A loop point sequence
// Buses travel: A[0]→...→A[last], then B[0]→...→B[last], then back to A[0]
// The returned sequence includes a duplicate of the first point at the end
// so the closing segment (last point -> first point) has a real distance
// and the bus travels it smoothly instead of snapping.
function buildLoopSequence(pointsA, pointsB) {
  let seq;
  if (pointsA.length >= 2 && pointsB.length >= 2) {
    // A forward, then B forward; B's last point connects back to A's first
    seq = [...pointsA, ...pointsB];
  } else if (pointsA.length >= 2) {
    // Only A defined — bounce A forward then backward
    seq = [...pointsA, ...[...pointsA].reverse().slice(1)];
  } else if (pointsB.length >= 2) {
    seq = [...pointsB, ...[...pointsB].reverse().slice(1)];
  } else {
    return [];
  }
  // Close the loop: append the first point again so there's a real
  // segment connecting the end of the sequence back to the start.
  seq = [...seq, seq[0]];
  return seq;
}

function stopSim() {
  state.simRunning = false;
  clearInterval(state.simInterval);
  state.simInterval = null;
  document.getElementById('sim-btn').textContent = '▶ Start Simulation';
  document.getElementById('sim-btn').classList.remove('running');
  state.simBuses.forEach(b => { if (b.marker) map.removeLayer(b.marker); });
  state.simBuses = [];
  state.routes.forEach(r => {
    r.fleetList = [];
    r.fleetIdCounter = 0;
  });
  renderRouteList();

  setStatus('■ Simulation stopped.');
}

function updateSpeed(v) {
  state.speedMult = parseInt(v);
}

// ════════════════════════════════════════════
//  SAVE / LOAD (JSON file)
// ════════════════════════════════════════════
function saveToFile() {
  const data = {
    version: 1,
    savedAt: new Date().toISOString(),
    stopIdCounter: state.stopIdCounter,
    routeIdCounter: state.routeIdCounter,
    stops: state.stops.map(s => ({
      id: s.id, name: s.name, lat: s.lat, lng: s.lng,
      types: s.types, isWaypoint: !!s.isWaypoint,
    })),
    routes: state.routes.map(r => ({
      id: r.id, name: r.name, type: r.type, color: r.color, buses: r.buses,
    fleetList: r.fleetList && r.fleetList.length ? r.fleetList : Array.from({length: r.buses||1},(_,i)=>({id:i+1,serviceType:r.type})),
    fleetIdCounter: r.fleetIdCounter || (r.buses || 1),
      fleetList: r.fleetList || [], fleetIdCounter: r.fleetIdCounter || 1,
      sideA: r.sideA, sideB: r.sideB, activeSide: r.activeSide,
    })),
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-');
  a.href = url;
  a.download = `bus-routes-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus(`💾 Saved ${data.stops.length} stops/waypoints and ${data.routes.length} routes`);
}

function loadFromFile(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      applyLoadedData(data);
    } catch (err) {
      alert('Could not load file: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function applyLoadedData(data) {
  if (!data || !Array.isArray(data.stops) || !Array.isArray(data.routes)) {
    alert('That file doesn\'t look like a valid bus routes save.');
    return;
  }

  // Stop simulation if running
  if (state.simRunning) stopSim();

  // Remove existing markers and route lines
  state.stops.forEach(s => { if (s.marker) map.removeLayer(s.marker); });
  state.routes.forEach(r => {
    if (r.polyA) map.removeLayer(r.polyA);
    if (r.polysA) r.polysA.forEach(p => map.removeLayer(p));
    if (r.polyB) map.removeLayer(r.polyB);
    if (r.polysB) r.polysB.forEach(p => map.removeLayer(p));
  });

  // Rebuild stops
  state.stops = data.stops.map(s => {
    const stop = {
      id: s.id, name: s.name, lat: s.lat, lng: s.lng,
      types: s.types || ['local'], marker: null, isWaypoint: !!s.isWaypoint,
    };
    createStopMarker(stop);
    return stop;
  });

  // Rebuild routes
  state.routes = data.routes.map(r => ({
    id: r.id, name: r.name, type: r.type, color: r.color, buses: r.buses,
    sideA: r.sideA || [], sideB: r.sideB || [],
    polyA: null, polysA: [], polyB: null, polysB: [],
    activeSide: r.activeSide || 'A',
  }));

  state.stopIdCounter = data.stopIdCounter || Math.max(0, ...state.stops.map(s => s.id), 0);
  state.routeIdCounter = data.routeIdCounter || Math.max(0, ...state.routes.map(r => r.id), 0);

  // Clear any in-progress UI selections
  window._multiAddOrder = {};
  editingSeqItem = null;

  redrawRouteLines();
  renderStopList();
  renderRouteList();

  // Fit map to loaded content
  if (state.stops.length) {
    const bounds = L.latLngBounds(state.stops.map(s => [s.lat, s.lng]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }

  setStatus(`📂 Loaded ${state.stops.length} stops/waypoints and ${state.routes.length} routes`);
}


function setStatus(msg) {
  document.getElementById('statusbar').textContent = msg;
}

// Init renders
renderStopList();
renderRouteList();
</script>
</body>
